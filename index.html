<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Crossword</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1 {
            font-weight: 600;
        }

        /* GRID CONTAINER */
        #grid {
            display: grid;
            justify-content: center;
            margin: 0 auto;
            gap: 4px;
        }

        /* CELLS */
        .cell {
            text-align: center;
            font-weight: bold;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            background-color: white;
            text-transform: lowercase;
        }

        /* Floating effect */
        .block {
            visibility: hidden;
        }

        /* Highlight active word */
        .highlight {
            background-color: #ffe066 !important;
        }

        /* Active clue (sticky on mobile) */
        #active-clue {
            font-size: 1.2rem;
            font-weight: 500;
            min-height: 50px;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
            opacity: 1;
            transform: translate(0, 0);
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        /* Desktop */
        @media (min-width: 768px) {
            #grid {
                grid-template-columns: repeat(10, 50px);
            }

            .cell {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
        }

        /* Mobile */
        @media (max-width: 767px) {
            #grid {
                grid-template-columns: repeat(10, 32px);
                gap: 3px;
            }

            .cell {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container py-4 text-center">

        <!-- Title -->
        <h1 class="mb-2">🇪🇸 Spanish Crossword</h1>
        <p class="text-muted mb-4">
            Tap a word → translate English → Spanish
        </p>
        <div class="mb-3">
            <label class="form-label">Difficulty:</label>
            <select id="difficulty-select" class="form-select w-auto mx-auto">
                <option value="easy">Easy</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
        </div>

        <!-- Grid -->
        <div id="grid" class="mb-4"></div>

        <!-- Controls -->
        <div class="d-flex justify-content-center gap-2 flex-wrap mb-3">

            <button class="btn btn-warning" onclick="revealCurrentWord()">
                👁️ Reveal Word
            </button>

            <button class="btn btn-danger" onclick="revealPuzzle()">
                🧩 Reveal Puzzle
            </button>

            <button class="btn btn-outline-secondary" onclick="initGame()">
                🔄 New Puzzle
            </button>

        </div>

        <!-- Active Clue -->
        <div id="active-clue" class="alert alert-primary">
            Select a word to begin
        </div>

    </div>

    <!-- Scripts -->
    <script src="words.js"></script>
    <script src="app.js"></script>

</body>

</html>

</html>
